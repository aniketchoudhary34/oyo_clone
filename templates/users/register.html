<!DOCTYPE html>
<html>
<head>
    <title>OYO Clone</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Register</h2>

    <div class="col-md-5 mx-auto">
        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="email" id="email" class="form-control mb-3" placeholder="Email">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">
        <input type="text" id="phone" class="form-control mb-3" placeholder="Phone">

        <button class="btn btn-success w-100" onclick="registerUser()">Register</button>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="/api/login/">Login</a>
        </p>
    </div>
</div>
<script>
    async function registerUser() {
        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const phone = document.getElementById("phone").value;

        const response = await fetch("/api/register/", {
            method: "POST",
            headers: {
                "content-type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                email: email,
                phone: phone
            })
        });

            const data = await response.json();
            
            if (response.ok){
                alert("resgistration successful");
                window.location.href = "/api/login/";
            }else{
                 console.log(data);
                alert("registration failed: " );
                

            }
    }
    
</script>
{% endblock %}
   

</body>
</html>
