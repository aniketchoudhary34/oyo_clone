{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; background:#f4f7fb;">
  <div style="width:420px; background:white; padding:35px; border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,0.12); text-align:center;">
    
    <h2 style="margin-bottom:10px;">Sign in with Google</h2>
    <p style="color:#666; margin-bottom:25px;">
      You are about to sign in using your Google account.
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" style="width:100%; padding:14px; border:none; border-radius:10px; background:#db4437; color:white; font-size:16px; font-weight:600; cursor:pointer;">
        Continue with Google
      </button>
    </form>

    <a href="/" style="display:block; margin-top:18px; color:#555; text-decoration:none;">
      ← Back to Home
    </a>
  </div>
</div>
{% endblock %}
