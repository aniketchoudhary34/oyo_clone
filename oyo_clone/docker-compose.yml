services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: hoteldb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/oyo_clone
    ports:
      - "8000:8000"
    depends_on:
      - db